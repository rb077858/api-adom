<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>בקשת API Token</title>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">בקשת גישה ל-API</h2>
        
        <form action="https://formsubmit.co/10c78f09ff3e88a44287010cbc307185" method="POST">
            
            <input type="hidden" name="_subject" value="בקשת API Token חדש!">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_next" value="https://rb.rweb.site/api-adom/thanks.html">

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">שם מלא</label>
                <input type="text" name="name" required class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">אימייל ליצירת קשר</label>
                <input type="email" name="email" required class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700 mb-1">למה אתה צריך את ה-API?</label>
                <textarea name="message" rows="3" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
                שלח בקשה
            </button>
        </form>
    </div>

</body>
              </html>
