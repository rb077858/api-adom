<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts Viewer</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #status { padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="status">Verifying token...</div>
    <iframe id="alertFrame" style="width:100%; height:100vh; display:none; border:none;"></iframe>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE8Fq9COJGtWzBreb1be-i7vy_ASJLsUo",
            authDomain: "tzeva-adom-3fffe.firebaseapp.com",
            projectId: "tzeva-adom-3fffe",
            storageBucket: "tzeva-adom-3fffe.firebasestorage.app",
            messagingSenderId: "892774546025",
            appId: "1:892774546025:web:a18eda31d810f92a7cc0f8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById("status").innerText = "Error: No token provided in the URL.";
        } else {
            db.collection("tokens").doc(token).get().then((doc) => {
                if (doc.exists && doc.data().active === true) {
                    // Hide the status text once access is granted
                    document.getElementById("status").style.display = "none";
                    const iframe = document.getElementById("alertFrame");
                    iframe.src = "https://api.tzevaadom.co.il/notifications"; 
                    iframe.style.display = "block";
                } else {
                    document.getElementById("status").innerText = "Access Denied: Invalid or inactive token.";
                }
            }).catch((error) => {
                document.getElementById("status").innerText = "Error: " + error.message;
            });
        }
    </script>
</body>
</html>
