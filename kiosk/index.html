<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alerts Dashboard</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            transition: background 0.5s ease;
        }
        .idle { background-color: #2ecc71; color: white; }
        .alert { background-color: #e74c3c; color: white; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        h1 { font-size: 4rem; margin: 20px; }
        p { font-size: 2rem; }
    </style>
</head>
<body id="app" class="idle">
    <h1 id="status">Loading...</h1>
    <p id="desc"></p>

    <script>
        const MY_TOWN = "נוקדים"; // Change this to your city
        
        async function fetchAlerts() {
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.oref.org.il/WarningMessages/Alert/alerts.json");
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const alerts = JSON.parse(data.contents);

                // Check if the city exists in the current alert data
                if (alerts && alerts.data && alerts.data.includes(MY_TOWN)) {
                    // Check if it's an "End of Event" message
                    const isEndOfEvent = alerts.title.includes("סתיים") || alerts.title.includes("סיום");

                    if (isEndOfEvent) {
                        updateUI("All Clear", "idle", "Event has ended.");
                    } else {
                        updateUI(alerts.title, "alert", alerts.desc);
                    }
                } else {
                    updateUI("All Clear", "idle", "No active alerts.");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function updateUI(status, className, desc) {
            document.getElementById('app').className = className;
            document.getElementById('status').innerText = status;
            document.getElementById('desc').innerText = desc;
        }

        // Fetch updates every 3 seconds
        setInterval(fetchAlerts, 3000);
        fetchAlerts();
    </script>
</body>
</html>
