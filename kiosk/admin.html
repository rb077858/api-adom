<!DOCTYPE html>
<html>
<body>
    <h1>Admin Control Panel</h1>
    <button onclick="sendAlert('alert')">TRIGGER RED ALERT</button>
    <button onclick="sendAlert('idle')">ALL CLEAR</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        
        const firebaseConfig = {apiKey: "AIzaSyDE8Fq9COJGtWzBreb1be-i7vy_ASJLsUo",
  authDomain: "tzeva-adom-3fffe.firebaseapp.com",
  databaseURL: "https://tzeva-adom-3fffe-default-rtdb.firebaseio.com",
  projectId: "tzeva-adom-3fffe",
  storageBucket: "tzeva-adom-3fffe.firebasestorage.app",
  messagingSenderId: "892774546025",
  appId: "1:892774546025:web:a18eda31d810f92a7cc0f8"};
        const db = getDatabase(initializeApp(firebaseConfig));

        window.sendAlert = (type) => {
            set(ref(db, 'manualAlert'), {
                active: type === 'alert',
                className: type === 'alert' ? 'alert' : 'idle',
                title: type === 'alert' ? 'EMERGENCY ALERT!' : 'System Normal',
                desc: type === 'alert' ? 'Manual override active' : ''
            });
        };
    </script>
</body>
</html>
